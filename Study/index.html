<DOCTYPE! html>
    <html>
        <head>
            <style>
                .sub {
                    background-color: rgb(201, 0, 0);
                    color: white;
                    border: none;
                    height: 30px;
                    width: 105px;
                    border-radius: 2px;
                    cursor: pointer;
                    margin-right: 8px;
                }
                .sub:hover{
                    opacity: 0.8;
                }
                .sub:active{
                    opacity: 0.6;
                }
                
                .join {
                    color: rgb(0, 153, 255);
                    border-color: rgb(0, 153, 255);
                    border-style: solid;
                    border-width: 1px;
                    height: 30px;
                    width: 65px;
                    border-radius: 2px;
                    cursor: pointer;
                }

                .tweet {
                    background-color: rgb(0, 119, 255);
                    color: white;
                    border: none;
                    border-radius: 35px;
                    height: 30px;
                    width: 70px;
                    font-weight: bold;
                    margin-left: 8px;
                 }
            </style>
        </head>
        <body>
            <button class="sub">SUBSCRIBE</button>
            <button class="join">JOIN</button>
            <button class="tweet">Tweet</button>
        </body>
    </html>
