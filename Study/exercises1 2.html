<!DOCTYPE html>
<html>
    <head>
        <style>
            .a {
                color: rgb(0, 113, 133);
            }
            .p{
                color: rgb(0, 118, 0);
                font-weight: bold;
            }
            .cart{
                background-color: rgb(255, 216,20);
                border: none;
                height: 30px;
                width: 100px;
                border-radius: 15px;
                cursor: pointer;
                margin-right: 8px;
            }
            .buy{
                background-color: rgb(255, 164, 28);
                border: none;
                height: 30px;
                width: 100px;
                border-radius: 15px;
                cursor: pointer;
                margin-right: 8px;
            }
        </style>
    </head>
    <body>
        <a href="" class="a">Back to Amazon</a>
        <h1>Nike Black Running Shoes</h1>
        <p class="p">$39 - in stock.</p>
        <p>Free delivery tommorrow</p>
        <button class="cart">Add to Cart</button>
        <button class="buy">Buy now</button>
    </body>
</html>
